# Synthetic evaluation corpus for ion-mem search quality tests.
# All content is fictional. No real user data.
# Designed to cover: title-term docs, content-term docs, near-duplicate
# fresh/stale pairs, kebab-case identifiers, topic_key hits, long content
# with a key term deep inside, distractors, and semantic-gap pairs.

- title: "auth-service architecture decision"
  content: "We decided to build the auth-service as a stateless JWT issuer. All tokens are short-lived and verified at the gateway."
  type: "architecture"
  topic_key: "architecture/auth-service"
  age_days: 5

- title: "rate-limiter design notes"
  content: "The rate-limiter uses a sliding window algorithm with Redis as the backing store. Limits are configurable per endpoint."
  type: "decision"
  topic_key: "sdd/rate-limiter/design"
  age_days: 10

- title: "database migration strategy"
  content: "All schema changes go through numbered migration files. We run migrations automatically on startup using the migrate function."
  type: "decision"
  topic_key: ""
  age_days: 7

- title: "database connection pooling"
  content: "We cap at one open connection with WAL mode and busy_timeout=5000. This prevents contention in single-process deployments."
  type: "decision"
  topic_key: ""
  age_days: 3

- title: "JWT login flow with refresh tokens"
  content: "Login endpoint issues a short-lived access token and a long-lived refresh token. Refresh tokens are stored hashed in the database."
  type: "pattern"
  topic_key: "architecture/jwt-auth"
  age_days: 14

- title: "cache invalidation approach"
  content: "We invalidate cache entries on write, not on read. This keeps reads fast at the cost of occasional cache misses on burst writes."
  type: "decision"
  topic_key: ""
  age_days: 20

- title: "search ranking weights"
  content: "Title gets weight 8, topic_key gets weight 6, type gets weight 3, tool_name gets weight 2, content and project get weight 1. This biases toward exact title and structured-address matches."
  type: "decision"
  topic_key: "architecture/search-weights"
  age_days: 2

- title: "search recency decay"
  content: "Recency decay uses a 30-day half-life. A result 30 days old is half as relevant as a fresh one with the same BM25 score."
  type: "decision"
  topic_key: "architecture/search-decay"
  age_days: 1

