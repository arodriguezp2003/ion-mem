# More exact-title match cases
- title: "FTS5 tokenizer behavior"
  content: "The unicode61 tokenizer splits on whitespace and punctuation including hyphens. This means kebab-case identifiers are indexed as individual tokens."
  type: "discovery"
  topic_key: ""
  age_days: 19

- title: "BM25 scoring explanation"
  content: "BM25 is negative in SQLite: more negative means more relevant. We multiply by an exp decay factor so older results move toward zero."
  type: "discovery"
  topic_key: "architecture/bm25-scoring"
  age_days: 4

- title: "soft delete behavior"
  content: "Deleted observations set deleted_at rather than removing the row. All queries filter on deleted_at IS NULL. FTS is updated by triggers."
  type: "decision"
  topic_key: ""
  age_days: 8

# Semantic gap: query 'how fast can we write data' → 'WAL mode performance'
- title: "WAL mode performance characteristics"
  content: "WAL mode allows concurrent reads during writes. Write throughput is higher than rollback journal mode. We set synchronous=NORMAL for a balance."
  type: "discovery"
  topic_key: ""
  age_days: 24

- title: "test isolation strategy"
  content: "Each test creates a fresh SQLite database in t.TempDir(). No shared state between tests. Cleanup is registered via t.Cleanup."
  type: "pattern"
